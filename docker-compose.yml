services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sm_bce
      POSTGRES_USER: sm_bce
      POSTGRES_PASSWORD: sm_bce_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sm_bce -d sm_bce"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgres://sm_bce:sm_bce_password@postgres:5432/sm_bce?sslmode=disable
    ports:
      - "${HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
